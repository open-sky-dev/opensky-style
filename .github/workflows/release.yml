name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Publish
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
      id-token: write # for npm trusted publishing (OIDC)
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Extract release notes from changelog
        run: scripts/ci/release-notes.sh "$GITHUB_REF_NAME" > "$RUNNER_TEMP/release-notes.md"
      - name: Publish to npm
        run: scripts/ci/release.sh
      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file "$RUNNER_TEMP/release-notes.md"
        env:
          GH_TOKEN: ${{ github.token }}
